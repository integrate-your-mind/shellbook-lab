name: ShellbookLab
options:
  bundleIdPrefix: com.shellbook
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  ShellbookLab:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShellbookLab
    info:
      path: ShellbookLab/Info.plist
      properties:
        CFBundleDisplayName: Shellbook Lab
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shellbook.lab
        INFOPLIST_KEY_CFBundleDisplayName: Shellbook Lab
  ShellbookLabTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShellbookLabTests
    dependencies:
      - target: ShellbookLab
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  ShellbookLab:
    build:
      targets:
        ShellbookLab: all
    test:
      targets:
        - ShellbookLabTests
